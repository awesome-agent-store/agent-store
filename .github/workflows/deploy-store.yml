name: Deploy store to Cloudflare

# Builds the Next.js store with OpenNext and deploys it to Cloudflare Workers.
# Replaces Vercel's git auto-deploy. Needs two repo secrets:
#   CLOUDFLARE_API_TOKEN         — a token with "Edit Cloudflare Workers" permission
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — the public anon key (inlined at build)
# and the CLOUDFLARE_ACCOUNT_ID repo variable.
on:
  # Gated on the e2e workflow: the store only deploys after e2e passes on main.
  workflow_run:
    workflows: [e2e]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only when the gating e2e run succeeded (manual dispatch has no
    # workflow_run context, so allow that path through too).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build the internal libs (@as/types → sdk) the store consumes.
      - run: pnpm exec turbo build --filter='@as/store^...'

      - name: Build (OpenNext)
        run: pnpm --filter @as/store build:cf
        env:
          NEXT_PUBLIC_API_URL: https://as-api-test.phenix3443.workers.dev
          NEXT_PUBLIC_SITE_URL: https://agent-store.panghuli.tech
          NEXT_PUBLIC_SUPABASE_URL: https://faiygihglitiuqywajyh.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare
        run: pnpm --filter @as/store exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
